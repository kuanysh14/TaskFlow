<div class="container">
  <h2>Your Workspaces</h2>

  <p>Total: {{ workspaces.length }}</p>

  <div class="workspace-grid">
    @for (ws of workspaces; track ws.id) {
      <div class="card" (click)="viewTasks(ws.id)">
        <h3>{{ ws.name }}</h3>
        <p>{{ ws.description }}</p>
      </div>
    } @empty {
      <p>No workspaces found. Add some in the Django Admin!</p>
    }
  </div>


  <button (click)="logout()">Logout</button>
</div>
