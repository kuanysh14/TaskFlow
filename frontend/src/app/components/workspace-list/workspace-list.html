<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="text-3xl font-bold text-gray-900">Your Workspaces</h1>
  </div>

  <p class="text-gray-600 mb-5">
    Total: {{ workspaces ? workspaces.length : '...' }}
  </p>

  <div *ngIf="!workspaces" class="workspace-grid">
    <div *ngFor="let item of [1,2,3]" class="workspace-card skeleton-card">
      <div class="skeleton-box skeleton-title"></div>
      <div class="skeleton-box skeleton-text"></div>
    </div>
  </div>

  <div *ngIf="workspaces" class="workspace-grid">
    <div *ngFor="let workspace of workspaces" class="workspace-card animate-pop-in">
      <div class="card-content">
        <h3 class="text-xl font-semibold text-blue-600">
          {{ workspace.name }}
        </h3>
        <p class="text-gray-600 mt-2">{{ workspace.description }}</p>
      </div>
    </div>
  </div>
</div>
